  <body>
    <canvas class="webgl"></canvas>
    <div class="overlay"></div>

    <!-- Logo: always visible, never changes size -->
    <div id="mc-badge">
      <span class="mc-logo">Mind<span class="mc-craft">Craft</span></span>
    </div>

    <!-- Booking: separate fixed element, shown only after diagnostic done -->
    <a id="mc-booking-link" class="mc-booking-btn" href="https://mindcraft-93858.web.app/book" style="display:none">Booking</a>

    <!-- 3D|Web toggle: hidden until diagnostic done -->
    <div id="mc-top-actions" class="mc-top-actions" style="display:none">
      <div class="mc-view-toggle" aria-label="Dashboard view switcher">
        <button type="button" class="mc-toggle-active" disabled aria-current="page">3D</button>
        <a id="mc-web-toggle" class="mc-toggle-inactive" href="https://mindcraft-93858.web.app/dashboard">Web</a>
      </div>
    </div>

    <div id="cooking">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div id="area">
        <div id="sides">
          <div id="pan"></div>
          <div id="handle"></div>
        </div>
        <div id="pancake">
          <div id="pastry"></div>
          <div id="pastry2"></div>
          <div id="pastry3"></div>
        </div>
      </div>
      <h1>Loading your study world... <span id="progressPercentage"></span>%</h1>
    </div>

    <button class="start" id="mc-start-btn">Enter World →</button>

    <!-- Instruction callout — always visible after Enter World, opens Projects overlay -->
    <button type="button" id="mc-open-projects" style="display:none" aria-label="Click Projects">
      Click Projects
    </button>

    <div id="mc-diag" aria-hidden="true">
      <div id="mc-diag-backdrop"></div>
      <div id="mc-diag-panel"></div>
    </div>
    <script src="mc-diagnostic.js?v=20260701-m4-excluded" defer></script>
  </body>
