<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true"><defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf3e2"/>
      <stop offset="0.62" stop-color="#eddab3"/>
      <stop offset="1" stop-color="#e2c793"/>
    </linearGradient>
    <radialGradient id="vign" cx="50%" cy="42%" r="70%">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a2410" stop-opacity="0.16"/>
    </radialGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#33230f"/>
    </marker>
  </defs><rect x="0" y="0" width="800" height="800" fill="url(#bg)"/>
    <path d="M560 400 L560 200 A100 100 0 0 1 760 200 L760 400 Z" fill="#fbf3e2" stroke="#33230f" stroke-width="4" opacity="0.9"/>
    <line x1="660" y1="100" x2="660" y2="400" stroke="#33230f" stroke-width="2.5" opacity="0.55"/>
    <!-- Archimedes' sphere snug inside a cylinder, 2:3 volume ratio -->
    <g transform="translate(260 560)">
      <rect x="-60" y="-140" width="120" height="140" fill="none" stroke="#33230f" stroke-width="6"/>
      <ellipse cx="0" cy="-140" rx="60" ry="16" fill="none" stroke="#33230f" stroke-width="5"/>
      <ellipse cx="0" cy="0" rx="60" ry="16" fill="none" stroke="#33230f" stroke-width="5"/>
      <circle cx="0" cy="-70" r="58" fill="#1d3a8a" opacity="0.55" stroke="#33230f" stroke-width="4"/>
    </g>
    <g transform="translate(480 610) scale(0.9 0.9)">
    <!-- robe -->
    <path d="M-70 190 Q-90 60 -46 -30 Q0 -58 46 -30 Q90 60 70 190 Z" fill="#274a4a" stroke="#33230f" stroke-width="5"/>
    <path d="M-46 -30 Q0 10 46 -30" fill="none" stroke="#33230f" stroke-width="3.5" opacity="0.6"/>
    <path d="M-20 190 L-14 40 M20 190 L14 40" stroke="#33230f" stroke-width="2.5" opacity="0.35"/>
    <!-- arm -->
    
    <path d="M36 -20 Q70 -90 60 -140" fill="none" stroke="#274a4a" stroke-width="16" stroke-linecap="round"/>
      <path d="M36 -20 Q70 -90 60 -140" fill="none" stroke="#33230f" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="58" cy="-144" r="9" fill="#e0b083" stroke="#33230f" stroke-width="3"/>
    
    <path d="M-40 -10 Q-70 30 -66 78" fill="none" stroke="#274a4a" stroke-width="16" stroke-linecap="round"/>
    <path d="M-40 -10 Q-70 30 -66 78" fill="none" stroke="#33230f" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-67" cy="82" r="9" fill="#e0b083" stroke="#33230f" stroke-width="3"/>
    <!-- head -->
    <circle cx="0" cy="-72" r="44" fill="#e0b083" stroke="#33230f" stroke-width="5"/>
    <path d="M-40 -84 Q0 -122 40 -84 Q42 -104 0 -116 Q-42 -104 -40 -84 Z" fill="#3a2717" stroke="#33230f" stroke-width="4"/>
    <path d="M-16 -68 q6 -8 12 0 M8 -68 q6 -8 12 0" stroke="#33230f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M-6 -50 q6 4 12 0" stroke="#33230f" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    
    
    
  </g>
  <rect x="0" y="0" width="800" height="800" fill="url(#vign)"/></svg>
