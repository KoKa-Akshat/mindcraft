<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft — Article Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F6F8;--w:#FFF;--bd:#E5E7EB;--bd2:#D1D5DB;
  --g:#58CC02;--gd:#4CAD00;--gdd:#3A8500;--forest:#1A3C2A;
  --tx:#1A1A1A;--mu:#6B7280;--mu2:#9CA3AF;
  --f:'Nunito',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{height:60px;background:var(--w);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,3vw,32px);position:sticky;top:0;z-index:100;gap:16px}
.topbar-left{display:flex;align-items:center;gap:14px}
.tb-logo{font-size:18px;font-weight:900;color:var(--forest);text-decoration:none;letter-spacing:-.3px;flex-shrink:0}
.tb-logo span{color:var(--g)}
.tb-divider{width:1px;height:22px;background:var(--bd)}
.tb-title-input{font-size:14px;font-weight:700;font-family:var(--f);color:var(--mu);border:none;background:none;outline:none;min-width:160px;max-width:300px}
.tb-title-input::placeholder{color:var(--mu2)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-status{font-size:12px;font-weight:700;color:var(--mu2);padding:0 8px}
.tb-btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:800;font-family:var(--f);cursor:pointer;transition:all .15s;border:none}
.tb-btn-ghost{background:none;color:var(--mu);border:1.5px solid var(--bd)}
.tb-btn-ghost:hover{border-color:var(--bd2);color:var(--tx)}
.tb-btn-draft{background:#F3F4F6;color:var(--tx);border:1.5px solid var(--bd)}
.tb-btn-draft:hover{background:#E9EBEF}
.tb-btn-publish{background:var(--g);color:#fff;box-shadow:0 3px 0 var(--gd)}
.tb-btn-publish:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 4px 0 var(--gd)}
.tb-btn-publish:active{transform:translateY(1px);box-shadow:0 1px 0 var(--gd)}

/* ── LAYOUT ── */
.editor-layout{display:flex;flex:1;gap:0;overflow:hidden;min-height:calc(100vh - 60px)}

/* ── LEFT SIDEBAR: METADATA ── */
.meta-panel{width:280px;flex-shrink:0;background:var(--w);border-right:1px solid var(--bd);overflow-y:auto;padding:24px 20px}
.meta-section{margin-bottom:24px}
.meta-section+.meta-section{padding-top:20px;border-top:1px solid var(--bd)}
.meta-label{font-size:11px;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px;display:block}
.meta-input{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:var(--f);font-weight:600;color:var(--tx);outline:none;transition:border-color .18s;background:var(--w)}
.meta-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(88,204,2,.08)}
.meta-input::placeholder{color:var(--mu2)}
textarea.meta-input{resize:vertical;min-height:72px;line-height:1.55}
select.meta-input{cursor:pointer}
.img-upload{border:2px dashed var(--bd);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .18s}
.img-upload:hover{border-color:var(--g)}
.img-upload svg{width:28px;height:28px;stroke:var(--mu2);fill:none;stroke-width:1.5;margin-bottom:8px}
.img-upload p{font-size:13px;color:var(--mu);font-weight:700}
.img-upload span{font-size:11px;color:var(--mu2);font-weight:600}
.img-preview{width:100%;aspect-ratio:16/9;border-radius:10px;object-fit:cover;display:none}

/* ── MAIN EDITOR ── */
.editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.editor-inner{max-width:740px;width:100%;margin:0 auto;padding:32px 24px 80px;flex:1}

/* ── TITLE INPUT ── */
.article-title-input{font-size:clamp(26px,3.5vw,38px);font-weight:900;color:var(--tx);border:none;background:none;outline:none;width:100%;font-family:var(--f);letter-spacing:-.5px;line-height:1.15;margin-bottom:10px;resize:none;overflow:hidden}
.article-title-input::placeholder{color:#D1D5DB}
.article-subtitle-input{font-size:18px;font-weight:600;color:var(--mu);border:none;background:none;outline:none;width:100%;font-family:var(--f);line-height:1.6;margin-bottom:28px;resize:none;overflow:hidden}
.article-subtitle-input::placeholder{color:#D1D5DB}
.editor-divider{height:1px;background:var(--bd);margin-bottom:20px}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:2px;padding:8px 10px;background:var(--w);border:1px solid var(--bd);border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
.tb-sep{width:1px;height:22px;background:var(--bd);margin:0 4px}
.tool{width:34px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;font-family:var(--f);transition:background .12s;color:var(--tx);font-size:13px;font-weight:800;flex-shrink:0}
.tool:hover{background:var(--bg)}
.tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tool.active{background:#EDF7E0;color:var(--gdd)}

/* ── BODY EDITOR ── */
.body-editor{min-height:420px;outline:none;font-size:16px;font-family:var(--f);color:var(--tx);line-height:1.8;font-weight:600}
.body-editor:empty::before{content:attr(data-placeholder);color:#D1D5DB;pointer-events:none}
.body-editor h1{font-size:28px;font-weight:900;letter-spacing:-.3px;margin:28px 0 10px;color:var(--tx)}
.body-editor h2{font-size:22px;font-weight:900;letter-spacing:-.2px;margin:24px 0 8px;color:var(--tx)}
.body-editor p{margin-bottom:16px}
.body-editor blockquote{border-left:4px solid var(--g);padding:14px 20px;margin:20px 0;background:rgba(88,204,2,.05);border-radius:0 10px 10px 0;font-weight:700;font-style:italic;color:#444}
.body-editor ul,.body-editor ol{padding-left:24px;margin-bottom:16px}
.body-editor li{margin-bottom:6px}
.body-editor a{color:var(--gdd);text-decoration:underline}

/* ── SOURCES ── */
.sources-section{margin-top:40px;padding-top:28px;border-top:1px solid var(--bd)}
.sources-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sources-title{font-size:12px;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.add-source-btn{font-size:13px;font-weight:800;color:var(--g);background:none;border:none;cursor:pointer;font-family:var(--f);padding:4px 0}
.add-source-btn:hover{text-decoration:underline}
.source-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.source-row input{flex:1;padding:9px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:14px;font-family:var(--f);font-weight:600;color:var(--tx);outline:none;transition:border-color .18s;background:var(--w)}
.source-row input:focus{border-color:var(--g)}
.source-row input::placeholder{color:var(--mu2)}
.remove-source{width:28px;height:28px;border-radius:7px;background:none;border:none;color:var(--mu2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0}
.remove-source:hover{color:#EF4444}
.remove-source svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:820px){.meta-panel{width:240px}.editor-inner{padding:24px 16px 60px}}
@media(max-width:640px){.editor-layout{flex-direction:column}.meta-panel{width:100%;border-right:none;border-bottom:1px solid var(--bd)}.topbar-left .tb-title-input{display:none}.topbar-left .tb-divider{display:none}}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-left">
    <a href="blog.html" class="tb-logo">Mind<span>Craft</span></a>
    <div class="tb-divider"></div>
    <input type="text" class="tb-title-input" id="topbarTitle" placeholder="Untitled Article">
  </div>
  <div class="topbar-right">
    <span class="tb-status" id="statusText">Draft</span>
    <button class="tb-btn tb-btn-ghost" onclick="previewArticle()">Preview</button>
    <button class="tb-btn tb-btn-draft" onclick="saveDraft()">Save Draft</button>
    <button class="tb-btn tb-btn-publish" onclick="publishArticle()">Publish</button>
  </div>
</div>

<div class="editor-layout">

  <!-- ── METADATA PANEL ── -->
  <aside class="meta-panel">

    <div class="meta-section">
      <label class="meta-label">Category</label>
      <select class="meta-input" id="category">
        <option value="Headquarters">Headquarters</option>
        <option value="Community">Community</option>
        <option value="Stories">Stories</option>
        <option value="Updates">Updates</option>
      </select>
    </div>

    <div class="meta-section">
      <label class="meta-label">Author Name</label>
      <input type="text" class="meta-input" id="authorName" placeholder="e.g. Akshat K." value="Akshat K.">
      <label class="meta-label" style="margin-top:10px">Author Role</label>
      <input type="text" class="meta-input" id="authorRole" placeholder="e.g. Co-Founder" value="Co-Founder">
    </div>

    <div class="meta-section">
      <label class="meta-label">Publish Date</label>
      <input type="date" class="meta-input" id="pubDate">
    </div>

    <div class="meta-section">
      <label class="meta-label">Featured Image</label>
      <div class="img-upload" id="imgUploadZone" onclick="document.getElementById('imgFile').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Click to upload image</p>
        <span>PNG, JPG up to 8MB</span>
      </div>
      <img class="img-preview" id="imgPreview" alt="">
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="previewImg(this)">
    </div>

    <div class="meta-section">
      <label class="meta-label">Has Photo Gallery</label>
      <select class="meta-input" id="hasGallery">
        <option value="no">No</option>
        <option value="yes">Yes — add gallery section</option>
      </select>
    </div>

  </aside>

  <!-- ── MAIN EDITOR ── -->
  <main class="editor-main">
    <div class="editor-inner">

      <textarea class="article-title-input" id="articleTitle" placeholder="Article Title" rows="2"
        oninput="syncTopbar();autoResize(this)"></textarea>
      <textarea class="article-subtitle-input" id="articleSubtitle" placeholder="Short excerpt or subtitle…" rows="2"
        oninput="autoResize(this)"></textarea>

      <div class="editor-divider"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <button class="tool" title="Heading 2" onclick="fmt('formatBlock','<h2>')"><b>H2</b></button>
        <button class="tool" title="Paragraph" onclick="fmt('formatBlock','<p>')"><svg viewBox="0 0 24 24"><path d="M13 4v16M6 4h10a4 4 0 010 8H6"/></svg></button>
        <div class="tb-sep"></div>
        <button class="tool" title="Bold" onclick="fmt('bold')"><b>B</b></button>
        <button class="tool" title="Italic" onclick="fmt('italic')"><i>I</i></button>
        <div class="tb-sep"></div>
        <button class="tool" title="Bullet list" onclick="fmt('insertUnorderedList')">
          <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
        </button>
        <button class="tool" title="Numbered list" onclick="fmt('insertOrderedList')">
          <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tool" title="Pull quote" onclick="fmt('formatBlock','<blockquote>')">
          <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <button class="tool" title="Insert link" onclick="insertLink()">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tool" title="Clear formatting" onclick="fmt('removeFormat')" style="font-size:11px;font-weight:900;color:var(--mu)">CLR</button>
      </div>

      <!-- Editable body -->
      <div class="body-editor" id="bodyEditor" contenteditable="true"
        data-placeholder="Start writing your article…"></div>

      <!-- Sources -->
      <div class="sources-section">
        <div class="sources-header">
          <span class="sources-title">Sources</span>
          <button class="add-source-btn" onclick="addSource()">+ Add Source</button>
        </div>
        <div id="sourcesList">
          <div class="source-row">
            <input type="text" placeholder="Source label (e.g. Macalester Beta Report)" class="source-label">
            <input type="url" placeholder="URL (optional)" class="source-url">
            <button class="remove-source" onclick="removeSource(this)" title="Remove">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
// Set today as default date
document.getElementById('pubDate').valueAsDate = new Date();

function syncTopbar() {
  const v = document.getElementById('articleTitle').value.trim();
  document.getElementById('topbarTitle').value = v || '';
  document.getElementById('topbarTitle').placeholder = v ? '' : 'Untitled Article';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function fmt(cmd, val) {
  document.getElementById('bodyEditor').focus();
  document.execCommand(cmd, false, val || null);
}

function insertLink() {
  const url = prompt('Enter URL:');
  if (url) fmt('createLink', url);
}

function addSource() {
  const row = document.createElement('div');
  row.className = 'source-row';
  row.innerHTML = `
    <input type="text" placeholder="Source label" class="source-label">
    <input type="url" placeholder="URL (optional)" class="source-url">
    <button class="remove-source" onclick="removeSource(this)" title="Remove">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;
  document.getElementById('sourcesList').appendChild(row);
}

function removeSource(btn) {
  const rows = document.querySelectorAll('.source-row');
  if (rows.length > 1) btn.parentElement.remove();
}

function gatherData() {
  const sources = [];
  document.querySelectorAll('.source-row').forEach(r => {
    const label = r.querySelector('.source-label').value.trim();
    const url = r.querySelector('.source-url').value.trim();
    if (label) sources.push({ label, url });
  });
  return {
    title: document.getElementById('articleTitle').value.trim(),
    excerpt: document.getElementById('articleSubtitle').value.trim(),
    category: document.getElementById('category').value,
    author: {
      name: document.getElementById('authorName').value.trim(),
      role: document.getElementById('authorRole').value.trim()
    },
    date: document.getElementById('pubDate').value,
    body: document.getElementById('bodyEditor').innerHTML,
    hasGallery: document.getElementById('hasGallery').value === 'yes',
    sources
  };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function saveDraft() {
  const data = gatherData();
  if (!data.title) { showToast('Add a title before saving.'); return; }
  const drafts = JSON.parse(localStorage.getItem('mc_drafts') || '[]');
  const existing = drafts.findIndex(d => d.title === data.title);
  data.status = 'draft';
  data.savedAt = new Date().toISOString();
  if (existing > -1) drafts[existing] = data;
  else drafts.push(data);
  localStorage.setItem('mc_drafts', JSON.stringify(drafts));
  document.getElementById('statusText').textContent = 'Saved';
  showToast('Draft saved.');
}

function publishArticle() {
  const data = gatherData();
  if (!data.title) { showToast('Add a title before publishing.'); return; }
  if (!data.body || data.body === '') { showToast('Article body is empty.'); return; }
  const articles = JSON.parse(localStorage.getItem('mc_published') || '[]');
  data.status = 'published';
  data.publishedAt = new Date().toISOString();
  data.id = Date.now();
  articles.unshift(data);
  localStorage.setItem('mc_published', JSON.stringify(articles));
  document.getElementById('statusText').textContent = 'Published';
  showToast('Article published! It will appear in the blog.');
}

function previewArticle() {
  const data = gatherData();
  if (!data.title) { showToast('Add a title to preview.'); return; }
  sessionStorage.setItem('mc_preview', JSON.stringify(data));
  showToast('Preview saved — open article.html?preview=1 to view.');
}

function previewImg(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('imgPreview');
    const zone = document.getElementById('imgUploadZone');
    img.src = e.target.result;
    img.style.display = 'block';
    zone.style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

// Load draft if ?draft param
const params = new URLSearchParams(window.location.search);
if (params.get('draft')) {
  const drafts = JSON.parse(localStorage.getItem('mc_drafts') || '[]');
  const d = drafts.find(x => x.title === decodeURIComponent(params.get('draft')));
  if (d) {
    document.getElementById('articleTitle').value = d.title;
    document.getElementById('articleSubtitle').value = d.excerpt || '';
    document.getElementById('category').value = d.category || 'Headquarters';
    document.getElementById('authorName').value = d.author?.name || '';
    document.getElementById('authorRole').value = d.author?.role || '';
    document.getElementById('bodyEditor').innerHTML = d.body || '';
    syncTopbar();
  }
}
</script>
</body>
</html>
