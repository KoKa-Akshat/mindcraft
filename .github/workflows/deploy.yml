name: Deploy MindCraft

on:
  push:
    branches: [main]

jobs:
  # Deploy marketing site to GitHub Pages
  deploy-marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy marketing site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: 'app/**,.github/**,webhook/**,node_modules/**,functions/**'
