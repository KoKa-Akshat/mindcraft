    <path d="M-40 -92 Q0 -120 40 -92 Z" fill="#c99a3a" stroke="#33230f" stroke-width="4"/>
    
  </g>
  <rect x="0" y="0" width="800" height="800" fill="url(#vign)"/></svg>
