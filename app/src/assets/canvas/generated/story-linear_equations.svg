      <circle r="6" fill="#c99a3a"/>
      <circle r="60" fill="none" stroke="#1d3a8a" stroke-width="3" stroke-dasharray="3 8"/>
    </g>
    <g transform="translate(300 600) scale(0.9 0.9)">
    <!-- robe -->
    <path d="M-70 190 Q-90 60 -46 -30 Q0 -58 46 -30 Q90 60 70 190 Z" fill="#4a3320" stroke="#33230f" stroke-width="5"/>
    <path d="M-46 -30 Q0 10 46 -30" fill="none" stroke="#33230f" stroke-width="3.5" opacity="0.6"/>
    <path d="M-20 190 L-14 40 M20 190 L14 40" stroke="#33230f" stroke-width="2.5" opacity="0.35"/>
    <!-- arm -->
    
    
    <path d="M40 10 Q86 6 108 34" fill="none" stroke="#4a3320" stroke-width="16" stroke-linecap="round"/>
      <path d="M40 10 Q86 6 108 34" fill="none" stroke="#33230f" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="112" cy="36" r="9" fill="#e0b083" stroke="#33230f" stroke-width="3"/>
      <circle r="18" fill="#fbf3e2" stroke="#33230f" stroke-width="4"/><line x1="0" y1="0" x2="0" y2="-10" stroke="#33230f" stroke-width="2.5"/>
