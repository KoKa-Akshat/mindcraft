<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0F15;--card:#181B25;--g:#58CC02;--tx:#F0F2F8;--mu:#8B93A8;--bd:rgba(255,255,255,.08);--f:'Nunito',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased}
nav{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,64px);border-bottom:1px solid var(--bd);background:rgba(13,15,21,.88);position:sticky;top:0;z-index:10}
.logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none}.logo span{color:var(--g)}
.back{font-size:14px;font-weight:800;color:var(--mu);text-decoration:none}.back:hover{color:#fff}
main{max-width:1120px;margin:0 auto;padding:clamp(48px,7vw,88px) 24px}
.eyebrow{font-size:11px;font-weight:900;color:var(--g);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
h1{font-size:clamp(34px,6vw,64px);line-height:1.02;font-weight:900;letter-spacing:-.5px;max-width:760px;margin-bottom:16px}
.sub{font-size:18px;line-height:1.7;color:var(--mu);font-weight:700;max-width:620px;margin-bottom:42px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
.card{display:flex;flex-direction:column;min-height:360px;background:var(--card);border:1px solid var(--bd);border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .18s,border-color .18s}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.18)}
.art{height:168px;display:flex;align-items:center;justify-content:center}
.art svg{width:220px;max-width:70%;height:auto;opacity:.9}
.body{padding:24px;display:flex;flex-direction:column;flex:1}
.meta{display:flex;justify-content:space-between;gap:16px;margin-bottom:12px}
.cat{font-size:10px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1.2px}
.date{font-size:12px;font-weight:800;color:rgba(255,255,255,.35)}
h2{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:12px}
p{font-size:14px;line-height:1.7;color:rgba(255,255,255,.55);font-weight:700;flex:1}
.author{margin-top:20px;font-size:13px;font-weight:800;color:rgba(255,255,255,.5)}
@media(max-width:760px){.grid{grid-template-columns:1fr}.card{min-height:0}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Mind<span>Craft</span></a>
  <a href="index.html#blog" class="back">Back to landing</a>
</nav>
<main>
  <div class="eyebrow">MindCraft Notes</div>
  <h1>Ideas from the team building better tutoring.</h1>
  <p class="sub">Updates on teaching, product thinking, and the learning systems behind MindCraft.</p>
  <section class="grid" id="articles"></section>
</main>
<script>
const articles = [
  {
    id: 1,
    title: 'Our Mission & Vision',
    excerpt: 'MindCraft was created by educators who truly care about teaching, and who live for the moment a student finally gets it.',
    category: 'Headquarters',
    date: 'Apr 5, 2026',
    author: 'Akshat K.',
    bg1: '#0A1F10',
    bg2: '#1A3C2A',
    accent: '#58CC02'
  },
  {
    id: 2,
    title: 'MindCraft was in Beta at Macalester last week',
    excerpt: 'A quick reflection from a Beta.mn event at Macalester, and what it reinforced about building with technology.',
    category: 'Community',
    date: 'Mar 28, 2026',
    author: 'Akshat K.',
    bg1: '#0A1428',
    bg2: '#1A2A50',
    accent: '#4A7BF7'
  }
];

function art(a) {
  return `<div class="art" style="background:linear-gradient(135deg,${a.bg1},${a.bg2})">
    <svg viewBox="0 0 240 150" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="38" y="28" width="78" height="94" rx="12" fill="white" opacity=".13"/>
      <rect x="55" y="48" width="44" height="8" rx="4" fill="white" opacity=".55"/>
      <rect x="55" y="66" width="38" height="6" rx="3" fill="white" opacity=".3"/>
      <rect x="55" y="80" width="48" height="6" rx="3" fill="white" opacity=".24"/>
      <rect x="132" y="42" width="70" height="56" rx="12" fill="white" opacity=".12"/>
      <path d="M74 122C99 99 129 92 166 96" stroke="${a.accent}" stroke-width="7" stroke-linecap="round"/>
      <circle cx="168" cy="96" r="9" fill="${a.accent}"/>
    </svg>
  </div>`;
}

document.getElementById('articles').innerHTML = articles.map(a => `
  <a class="card" href="article.html?id=${a.id}">
    ${art(a)}
    <div class="body">
      <div class="meta"><span class="cat">${a.category}</span><span class="date">${a.date}</span></div>
      <h2>${a.title}</h2>
      <p>${a.excerpt}</p>
      <div class="author">${a.author}</div>
    </div>
  </a>
`).join('');
</script>
</body>
</html>
