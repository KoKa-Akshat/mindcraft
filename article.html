<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft — Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0F15;--bg2:#13161F;--card:#181B25;
  --g:#58CC02;--gd:#4CAD00;--gdd:#3A8500;
  --tx:#F0F2F8;--mu:#8B93A8;--bd:rgba(255,255,255,.08);
  --f:'Nunito',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── NAV ── */
nav{height:62px;background:rgba(13,15,21,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,64px);position:sticky;top:0;z-index:100}
.nav-logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-.3px}
.nav-logo span{color:var(--g)}
.back-link{font-size:14px;font-weight:700;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s}
.back-link:hover{color:var(--tx)}
.back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── HERO ── */
.article-hero{position:relative;height:clamp(300px,42vw,480px);overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero-bg{position:absolute;inset:0}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.55) 100%)}
.hero-badges{position:absolute;bottom:28px;left:clamp(20px,5vw,64px);display:flex;gap:10px;z-index:2}
.hbadge{font-size:11px;font-weight:900;padding:6px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.hbadge-cat{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff}
.hbadge-date{background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:rgba(255,255,255,.8);font-weight:700;text-transform:none;letter-spacing:0}
.hero-illo{position:relative;z-index:1;opacity:.22}

/* ── ARTICLE CONTAINER ── */
.article-wrap{max-width:700px;margin:0 auto;padding:clamp(40px,6vw,72px) 24px clamp(60px,8vw,100px)}

/* ── TITLE BLOCK ── */
.article-cat{font-size:11px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:block}
.article-title{font-size:clamp(28px,4.5vw,46px);font-weight:900;color:var(--tx);line-height:1.12;letter-spacing:-.6px;margin-bottom:20px}
.article-byline{display:flex;align-items:center;gap:12px;padding-bottom:28px;border-bottom:1px solid var(--bd);margin-bottom:36px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.av-green{background:linear-gradient(135deg,#3A8500,#1A3C2A)}
.av-blue{background:linear-gradient(135deg,#1E3A6A,#2A5AAF)}
.byline-name{font-size:15px;font-weight:800;color:var(--tx)}
.byline-role{font-size:13px;color:var(--mu);font-weight:700;margin-top:1px}
.byline-date{margin-left:auto;font-size:13px;color:var(--mu);font-weight:700}

/* ── BODY BLOCKS ── */
.body-p{font-size:17px;color:rgba(240,242,248,.82);line-height:1.82;font-weight:600;margin-bottom:26px}
.body-h2{font-size:26px;font-weight:900;color:var(--tx);letter-spacing:-.3px;line-height:1.2;margin:40px 0 16px}
.body-quote{border-left:4px solid var(--g);padding:18px 24px;margin:32px 0;background:rgba(88,204,2,.05);border-radius:0 12px 12px 0}
.body-quote p{font-size:19px;font-weight:800;color:var(--tx);line-height:1.5;font-style:italic;letter-spacing:-.1px}

/* ── GALLERY ── */
.gallery-section{margin:40px 0}
.gallery-label{font-size:11px;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gallery-placeholder{aspect-ratio:4/3;border-radius:12px;background:var(--card);border:1.5px dashed rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mu)}
.gallery-placeholder svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5;opacity:.5}
.gallery-placeholder span{font-size:12px;font-weight:700}
.gallery-placeholder.wide{grid-column:span 2;aspect-ratio:8/4}
.gallery-note{margin-top:10px;font-size:13px;color:var(--mu);font-weight:600;font-style:italic;text-align:center}

/* ── SOURCES ── */
.sources-section{margin-top:48px;padding-top:28px;border-top:1px solid var(--bd)}
.sources-title{font-size:13px;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px}
.sources-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.sources-list li a{font-size:14px;font-weight:700;color:var(--g);text-decoration:none;transition:opacity .15s}
.sources-list li a:hover{opacity:.75;text-decoration:underline}

/* ── PREV/NEXT ── */
.nav-pills{display:flex;gap:10px;justify-content:center;margin:clamp(40px,5vw,56px) 0 clamp(48px,6vw,64px);flex-wrap:wrap}
.nav-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-radius:40px;padding:12px 22px;font-size:14px;font-weight:800;color:var(--tx);text-decoration:none;cursor:pointer;transition:all .18s;max-width:300px}
.nav-pill:hover{border-color:rgba(255,255,255,.18);background:var(--card2)}
.nav-pill.disabled{opacity:.3;pointer-events:none}
.nav-pill svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-pill .pill-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── RELATED ── */
.related-section{padding:0 clamp(20px,5vw,64px) clamp(60px,8vw,100px);max-width:1180px;margin:0 auto}
.related-label{font-size:12px;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;display:block;padding-top:clamp(28px,4vw,40px);border-top:1px solid var(--bd)}
.related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.rel-card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid var(--bd);transition:transform .2s,border-color .2s;display:flex;align-items:center;gap:0}
.rel-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.14)}
.rel-img{width:110px;min-height:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rel-body{padding:16px 18px;flex:1}
.rel-cat{font-size:10px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.rel-title{font-size:14px;font-weight:900;color:var(--tx);line-height:1.3}

@media(max-width:600px){.gallery-grid{grid-template-columns:1fr 1fr}.gallery-placeholder.wide{grid-column:span 2}.related-grid{grid-template-columns:1fr}.rel-img{width:80px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Mind<span>Craft</span></a>
  <a href="blog.html" class="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    All Articles
  </a>
</nav>

<div id="hero-area"></div>
<div class="article-wrap" id="article-body"></div>
<div class="related-section" id="related-section"></div>

<script>
const ARTICLES = [
  {
    id: 1,
    title: "Our Mission & Vision",
    excerpt: "We started MindCraft with one belief: great tutoring should leave students more capable, not more dependent. Here's what drives everything we build.",
    category: "Headquarters",
    date: "April 5, 2026",
    author: { name: "Akshat K.", role: "Co-Founder", initial: "A" },
    bg1: "#0A1F10", bg2: "#1A3C2A", accent: "#58CC02",
    avClass: "av-green",
    sources: [],
    body: [
      { t:"p", c:"Most tutoring is transactional. A student struggles, a tutor explains, the student passes the test, and the cycle repeats. Nothing transfers. Nothing sticks. That's the problem we set out to fix." },
      { t:"h2", c:"What we believe" },
      { t:"p", c:"We believe the goal of tutoring isn't to get through the homework. It's to build the kind of understanding that makes homework feel manageable. Every student is capable of genuine mastery — they just need the right system around them, one that reinforces, extends, and builds real habits around learning." },
      { t:"quote", c:"We don't just tutor. We teach you how to learn on your own. Forever." },
      { t:"h2", c:"How we're different" },
      { t:"p", c:"MindCraft tutors are high-performing college students who recently mastered the same subjects your child is working through. They remember what it felt like to be stuck, and they know the exact path out. Every session is structured to build habits around reviewing, reinforcing, and practicing — so progress continues between sessions, not just during them." },
      { t:"p", c:"After every session, students leave with a clear summary of what was covered, organized key concepts, and personalized practice problems. Parents get visibility into what's actually being learned. Over time, the goal is simple: students rely less on us, and more on themselves." },
      { t:"h2", c:"What's ahead" },
      { t:"p", c:"We're starting in St. Paul, MN, focused on high school mathematics. The system we've built — session capture, structured summaries, practice generation, progress tracking — is designed to grow. Our goal is to make great learning support accessible to every student who wants to move forward. We're just getting started." }
    ]
  },
  {
    id: 2,
    title: "MindCraft was in Beta at Macalester last week",
    excerpt: "We ran our first real-world beta at Macalester College in St. Paul. Here's what we learned, what worked, and what comes next.",
    category: "Community",
    date: "March 28, 2026",
    author: { name: "Akshat K.", role: "Co-Founder", initial: "A" },
    bg1: "#0A1428", bg2: "#1A2A50", accent: "#4A7BF7",
    avClass: "av-blue",
    hasGallery: true,
    sources: [],
    body: [
      { t:"p", c:"Last week, a small cohort of Macalester students joined us for MindCraft's first structured beta. We matched students with tutors, ran live sessions, and put the full system to the test — from the tutor-student match flow to the post-session summary output." },
      { t:"h2", c:"What we tested" },
      { t:"p", c:"The beta was focused on three core questions: Does the tutor-student match feel right? Does the session itself feel structured and purposeful? And does the post-session output actually help students know what to do next? We wanted real answers, not assumptions." },
      { t:"h2", c:"What we found" },
      { t:"p", c:"The short answer: it worked better than we expected, and the gaps were exactly where we'd predicted. Students responded strongly to having structured session summaries waiting for them after each session. Tutors said the framework made their sessions easier to run and easier to keep focused. The clearest piece of feedback was around scheduling — students wanted more flexibility in how they book and reschedule." },
      { t:"quote", c:"I actually understood what I was learning, not just how to get through the problem set." },
      { t:"gallery", c:"Photos from the Macalester beta week — sessions, whiteboard moments, and the team. More photos coming." },
      { t:"h2", c:"What's next" },
      { t:"p", c:"We're incorporating beta feedback into the platform over the next few weeks. Scheduling flexibility is priority one. We're also expanding our tutor cohort and opening up to students across the broader St. Paul area. If you're interested in joining the next cohort, the link to sign up is below." }
    ]
  }
];

function heroSVG(accent) {
  return `<svg viewBox="0 0 520 280" width="380" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="60" y="40" width="120" height="160" rx="14" fill="white" opacity=".12"/>
    <rect x="80" y="60" width="80" height="10" rx="5" fill="white" opacity=".5"/>
    <rect x="80" y="78" width="64" height="7" rx="3.5" fill="white" opacity=".3"/>
    <rect x="80" y="92" width="72" height="7" rx="3.5" fill="white" opacity=".28"/>
    <rect x="80" y="116" width="48" height="30" rx="8" fill="${accent}" opacity=".35"/>
    <rect x="220" y="28" width="200" height="110" rx="14" fill="white" opacity=".12"/>
    <rect x="240" y="50" width="130" height="10" rx="5" fill="white" opacity=".5"/>
    <rect x="240" y="68" width="100" height="7" rx="3.5" fill="white" opacity=".3"/>
    <rect x="240" y="82" width="114" height="7" rx="3.5" fill="white" opacity=".28"/>
    <rect x="220" y="158" width="200" height="80" rx="14" fill="${accent}" opacity=".12"/>
    <rect x="240" y="176" width="90" height="8" rx="4" fill="${accent}" opacity=".5"/>
    <rect x="240" y="192" width="68" height="6" rx="3" fill="white" opacity=".2"/>
  </svg>`;
}

function galleryBlock() {
  return `<div class="gallery-section">
    <div class="gallery-label">Event Photos</div>
    <div class="gallery-grid">
      <div class="gallery-placeholder wide">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Featured photo</span>
      </div>
      <div class="gallery-placeholder">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Photo</span>
      </div>
      <div class="gallery-placeholder">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Photo</span>
      </div>
      <div class="gallery-placeholder">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Photo</span>
      </div>
      <div class="gallery-placeholder">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Photo</span>
      </div>
    </div>
    <p class="gallery-note">Photos will be added here after the event.</p>
  </div>`;
}

function renderBlock(b) {
  if (b.t === 'p')     return `<p class="body-p">${b.c}</p>`;
  if (b.t === 'h2')    return `<h2 class="body-h2">${b.c}</h2>`;
  if (b.t === 'quote') return `<div class="body-quote"><p>${b.c}</p></div>`;
  if (b.t === 'gallery') return galleryBlock();
  return '';
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;
  const a = ARTICLES.find(x => x.id === id) || ARTICLES[0];
  const idx = ARTICLES.indexOf(a);
  const prev = ARTICLES[idx - 1] || null;
  const next = ARTICLES[idx + 1] || null;

  document.title = `MindCraft — ${a.title}`;

  // Hero
  document.getElementById('hero-area').innerHTML = `
    <div class="article-hero">
      <div class="hero-bg" style="background:linear-gradient(145deg,${a.bg1} 0%,${a.bg2} 100%)"></div>
      <div class="hero-overlay"></div>
      <div class="hero-illo">${heroSVG(a.accent)}</div>
      <div class="hero-badges">
        <span class="hbadge hbadge-cat">${a.category}</span>
        <span class="hbadge hbadge-date">${a.date}</span>
      </div>
    </div>`;

  // Body
  document.getElementById('article-body').innerHTML = `
    <span class="article-cat">${a.category}</span>
    <h1 class="article-title">${a.title}</h1>
    <div class="article-byline">
      <div class="av ${a.avClass}">${a.author.initial}</div>
      <div>
        <div class="byline-name">${a.author.name}</div>
        <div class="byline-role">${a.author.role}</div>
      </div>
      <div class="byline-date">${a.date}</div>
    </div>
    ${a.body.map(renderBlock).join('')}
    ${a.sources && a.sources.length ? `
      <div class="sources-section">
        <div class="sources-title">Sources</div>
        <ul class="sources-list">
          ${a.sources.map(s => `<li><a href="${s.url}" target="_blank" rel="noopener">${s.label}</a></li>`).join('')}
        </ul>
      </div>` : ''}
    <div class="nav-pills">
      ${prev
        ? `<a href="article.html?id=${prev.id}" class="nav-pill"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg><span class="pill-text">${prev.title}</span></a>`
        : `<span class="nav-pill disabled"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg><span>First article</span></span>`}
      ${next
        ? `<a href="article.html?id=${next.id}" class="nav-pill"><span class="pill-text">${next.title}</span><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>`
        : `<span class="nav-pill disabled"><span>Latest article</span><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>`}
    </div>`;

  // Related
  const related = ARTICLES.filter(x => x.id !== a.id).slice(0, 2);
  if (related.length) {
    document.getElementById('related-section').innerHTML = `
      <span class="related-label">More from MindCraft</span>
      <div class="related-grid">
        ${related.map(r => `
          <div class="rel-card" onclick="window.location='article.html?id=${r.id}'">
            <div class="rel-img" style="background:linear-gradient(135deg,${r.bg1},${r.bg2})"></div>
            <div class="rel-body">
              <div class="rel-cat">${r.category}</div>
              <div class="rel-title">${r.title}</div>
            </div>
          </div>`).join('')}
      </div>`;
  }
}

render();
</script>
</body>
</html>
