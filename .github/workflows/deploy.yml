name: Deploy MindCraft

# Auto-deploys Firebase Hosting on every push to main, so `main` is the single
# source of truth and nobody overwrites the live site with a stale local build.
# Auth is a service account (FIREBASE_SERVICE_ACCOUNT secret) — the old
# FIREBASE_TOKEN flow is dead in current firebase-tools.
on:
  push:
    branches: [main]

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Only the app needs a build; world (worlds/world2) and marketing are static.
      - name: Build app
        working-directory: app
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting (app + world + marketing)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy \
            --only hosting:app,hosting:world1,hosting:marketing \
            --project mindcraft-93858 --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
