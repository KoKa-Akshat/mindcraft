  </head>
  <body>
    <canvas class="webgl"></canvas>
    <div class="overlay"></div>

    <!-- MindCraft corner badge -->
    <div id="mc-badge">
      <span class="mc-logo">Mind<span class="mc-craft">Craft</span></span>
    </div>

    <!-- Loading screen -->
    <div id="cooking">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div id="area">
        <div id="sides">
          <div id="pan"></div>
          <div id="handle"></div>
        </div>
        <div id="pancake">
          <div id="pastry"></div>
          <div id="pastry2"></div>
          <div id="pastry3"></div>
        </div>
      </div>
      <h1>Loading your study world... <span id="progressPercentage"></span>%</h1>
    </div>

    <button class="start" id="mc-start-btn">Enter World →</button>
    <script>
      document.getElementById('mc-start-btn').addEventListener('click', function() {
        setTimeout(function() {
          document.getElementById('mc-badge').classList.add('show');
          document.getElementById('mc-hint').classList.add('show');
        }, 1800);
      });
    </script>

    <!-- MindCraft hint overlay (shown after entering) -->
    <div id="mc-hint" onclick="window.MC_onProjectsOpen&&window.MC_onProjectsOpen()" style="cursor:pointer">
      <p>Click on Projects</p>
    </div>

    <!-- Diagnostic overlay (projects / diagnostics screen) -->
    <div id="mc-diag" aria-hidden="true">
      <div id="mc-diag-backdrop"></div>
      <div id="mc-diag-panel"></div>
    </div>
    <script src="mc-diagnostic.js?v=879bdfe9" defer></script>
  </body>
</html>
