<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindCraft — First Spark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #060c09;
      color: #fff8e9;
      font-family: "Nunito Sans", system-ui, sans-serif;
      overflow: hidden;
    }
    #app {
      position: fixed;
      inset: 0;
      background: #060c09;
    }
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 42%, rgba(196,245,71,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    #bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    #bubbles.on { opacity: 1; }
    .bubble {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
    }
    .center {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      z-index: 2;
      pointer-events: none;
    }
    .center.interactive { pointer-events: auto; }
    .brand {
      font-family: Georgia, serif;
      font-size: clamp(3rem, 12vw, 6.5rem);
      letter-spacing: 0.08em;
      animation: titleIn 4s ease forwards;
    }
    .line {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 300;
      line-height: 1.4;
      animation: lineIn 5s ease forwards;
    }
    .underline {
      display: block;
      height: 2px;
      width: 0;
      margin: 14px auto 0;
      background: #c4f547;
      animation: underline 0.6s 2.6s ease forwards;
    }
    .card {
      width: min(520px, 92vw);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid rgba(196,245,71,0.22);
      background: rgba(8,18,14,0.82);
      backdrop-filter: blur(20px);
      text-align: left;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s ease, transform 1.2s ease;
    }
    .card.on { opacity: 1; transform: translateY(0); }
    .eyebrow { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(196,245,71,0.75); margin-bottom: 8px; }
    .card h2 { font-family: Georgia, serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 10px; }
    .sub { color: rgba(255,248,233,0.72); line-height: 1.5; margin-bottom: 18px; font-size: 0.95rem; }
    .row { display: flex; gap: 10px; }
    input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff8e9;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: rgba(196,245,71,0.45); }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-weight: 600;
    }
    .add {
      padding: 0 18px;
      background: rgba(196,245,71,0.12);
      border: 1px solid rgba(196,245,71,0.35);
      color: #c4f547;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; min-height: 32px; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(196,245,71,0.35);
      background: rgba(196,245,71,0.08);
      font-size: 0.9rem;
    }
    .go {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,248,233,0.4);
      transition: all 0.3s ease;
    }
    .go.ready { background: #c4f547; color: #08120e; }
    .paper {
      width: min(700px, 92vw);
      max-height: 88vh;
      overflow: auto;
      padding: 28px;
      border-radius: 18px;
      background: #f4f2ec;
      color: #1a1a1a;
      text-align: left;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.9s ease, transform 1s ease;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .paper.on { opacity: 1; transform: scale(1); }
    .stamp { font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(26,26,26,0.55); margin-bottom: 12px; }
    .intro { font-family: Georgia, serif; font-style: italic; font-size: 1.15rem; line-height: 1.55; color: #143a2e; margin-bottom: 14px; }
    .stem { font-size: 1.05rem; line-height: 1.55; margin: 16px 0; padding-top: 16px; border-top: 1px solid rgba(26,26,26,0.1); }
    .choice {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      border: 1px solid rgba(26,26,26,0.1);
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .choice:hover { border-color: #c4f547; box-shadow: 0 0 0 3px rgba(196,245,71,0.15); }
    .choice.picked { border-color: #c4f547; box-shadow: 0 0 0 3px rgba(196,245,71,0.22); }
    .feedback {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(196,245,71,0.18);
      border-left: 3px solid #c4f547;
      line-height: 1.5;
      display: none;
    }
    .feedback.on { display: block; }
    .reveal {
      width: min(520px, 92vw);
      padding: 36px;
      border-radius: 20px;
      background: rgba(8,18,14,0.85);
      border: 1px solid rgba(196,245,71,0.2);
      text-align: center;
      opacity: 0;
      transform: scale(0.94);
      transition: all 1s ease;
    }
    .reveal.on { opacity: 1; transform: scale(1); }
    .reveal h2 { font-family: Georgia, serif; font-size: 2.4rem; margin: 10px 0; }
    .reveal p { color: rgba(255,248,233,0.72); line-height: 1.5; margin-bottom: 20px; }
    .cta {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 12px;
      background: #c4f547;
      color: #08120e;
      text-decoration: none;
      font-weight: 700;
      margin: 4px;
    }
    .skip {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 8px 12px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,248,233,0.2);
      color: rgba(255,248,233,0.7);
      font-size: 0.8rem;
    }
    .matching { font-size: 1.1rem; letter-spacing: 0.04em; animation: pulse 1.4s ease infinite; }
    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(12px); }
      20% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    @keyframes lineIn {
      0%, 10% { opacity: 0; transform: translateY(10px); }
      25%, 85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; }
    }
    @keyframes underline { to { width: min(280px, 70vw); } }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="glow"></div>
    <div id="bubbles"></div>
    <div id="stage" class="center"></div>
    <button class="skip" id="skip" hidden>Skip intro</button>
  </div>
  <script>
    const stage = document.getElementById('stage')
    const bubblesEl = document.getElementById('bubbles')
    const skip = document.getElementById('skip')
    let interests = []
    let bubbles = []
    let raf = 0
    let t = 0
    let gather = false

    const SCENES = {
      tales: {
        cooking: { title: 'Anansi the Spider', hero: 'Anansi', place: 'Forest villages of the Gold Coast' },
        music: { title: 'The Master Drummer', hero: 'Kwame', place: 'Royal drumming academy, Kumasi' },
        default: { title: 'Your First Scene', hero: 'the guide', place: 'a world built from what you love' },
      },
    }

    function pickTale() {
      const a = interests[0]?.toLowerCase() || ''
      if (a.includes('cook') || a.includes('food')) return SCENES.tales.cooking
      if (a.includes('music') || a.includes('drum') || a.includes('beat')) return SCENES.tales.music
      return SCENES.tales.default
    }

    function makeBubbles(n) {
      bubblesEl.innerHTML = ''
      bubbles = []
      const w = innerWidth, h = innerHeight
      for (let i = 0; i < n; i++) {
        const size = 12 + Math.pow(Math.random(), 2) * 90
        const el = document.createElement('div')
        el.className = 'bubble'
        el.style.width = el.style.height = size + 'px'
        el.style.background = `rgba(196,245,71,${0.04 + Math.random() * 0.1})`
        bubblesEl.appendChild(el)
        bubbles.push({
          el, size,
          x: Math.random() * w,
          y: Math.random() * h,
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.25,
          phase: Math.random() * Math.PI * 2,
        })
      }
    }

    function tick(now) {
      t += 0.016
      const cx = innerWidth * 0.5, cy = innerHeight * 0.5
      bubbles.forEach(b => {
        let x = b.x + Math.sin(t * 0.4 + b.phase) * 16 * b.dx + t * b.dx * 10
        let y = b.y + Math.cos(t * 0.35 + b.phase) * 12 * b.dy + t * b.dy * 8
        if (gather) {
          x += (cx - x) * 0.05
          y += (cy - y) * 0.05
        }
        b.x = x; b.y = y
        b.el.style.transform = `translate3d(${x - b.size/2}px,${y - b.size/2}px,0)`
      })
      raf = requestAnimationFrame(tick)
    }

    function showArrival() {
      skip.hidden = false
      stage.className = 'center'
      stage.innerHTML = '<h1 class="brand">MindCraft</h1>'
      setTimeout(showPromise, 4000)
    }

    function showPromise() {
      stage.innerHTML = '<p class="line">Be good at your craft.</p>'
      setTimeout(() => {
        stage.innerHTML = '<p class="line">We\'ll find the math hiding inside it.<span class="underline"></span></p>'
      }, 2200)
      setTimeout(showInvite, 5200)
    }

    function showInvite() {
      bubblesEl.classList.add('on')
      makeBubbles(innerWidth < 640 ? 28 : 48)
      cancelAnimationFrame(raf)
      raf = requestAnimationFrame(tick)
      stage.className = 'center interactive'
      stage.innerHTML = `
        <div class="card on" id="card">
          <p class="eyebrow">Your scene starts here</p>
          <h2>Tell us what you're into</h2>
          <p class="sub">Type an interest and press Enter. We'll build your first problem around it.</p>
          <div class="row">
            <input id="inp" placeholder="cooking, music, basketball…" />
            <button class="add" id="addBtn">Add</button>
          </div>
          <div class="chips" id="chips"></div>
          <button class="go" id="go">Build my scene →</button>
        </div>`
      const inp = document.getElementById('inp')
      const go = document.getElementById('go')
      const add = () => {
        const v = inp.value.trim()
        if (!v || interests.length >= 4) return
        interests.push(v)
        inp.value = ''
        renderChips()
        go.classList.toggle('ready', interests.length >= 2)
      }
      document.getElementById('addBtn').onclick = add
      inp.onkeydown = e => { if (e.key === 'Enter') add() }
      go.onclick = () => { if (interests.length >= 2) showMatching() }
      inp.focus()
    }

    function renderChips() {
      document.getElementById('chips').innerHTML = interests.map(i => `<span class="chip">${i}</span>`).join('')
    }

    function showMatching() {
      skip.hidden = true
      gather = true
      stage.className = 'center'
      stage.innerHTML = '<p class="matching">Finding your scene…</p>'
      setTimeout(showQuestion, 1600)
    }

    function showQuestion() {
      const tale = pickTale()
      const a = interests[0] || 'your craft'
      const b = interests[1] || 'what you love'
      stage.className = 'center interactive'
      stage.innerHTML = `
        <div class="paper on">
          <p class="stamp">${tale.hero} · ${tale.place}</p>
          <p class="intro">You told us you care about ${a} and ${b}. ${tale.hero} is in ${tale.place}, and tonight the numbers decide whether the scene holds — not as homework, but as part of the story.</p>
          <p class="stem">At the sanctuary pond, keeper Simon records water depth on Stevin's decimal ladder. The water sits exactly 3 rungs down on the tenths ladder — three parts of ten equal steps. What should he write for three-tenths of a meter?</p>
          <button class="choice" data-i="0">0.3 meters</button>
          <button class="choice" data-i="1">3.10 meters</button>
          <button class="choice" data-i="2">10.3 meters</button>
          <button class="choice" data-i="3">0.13 meters</button>
          <p class="feedback" id="fb"></p>
        </div>`
      const fb = document.getElementById('fb')
      document.querySelectorAll('.choice').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.choice').forEach(b => b.disabled = true)
          btn.classList.add('picked')
          fb.textContent = btn.dataset.i === '0'
            ? 'Simon marks 0.3 on the slate. The night keeper reads it at a glance — the pond settles at exactly the right depth by dawn.'
            : 'The night keeper misreads the number. Pause — the tenths rung is one place, not two numbers side by side.'
          fb.classList.add('on')
          setTimeout(showReveal, 2400)
        }
      })
    }

    function showReveal() {
      gather = false
      stage.className = 'center interactive'
      stage.innerHTML = `
        <div class="reveal on">
          <p class="eyebrow">You just solved something real.</p>
          <h2>This is MindCraft.</h2>
          <p>Your map starts here — built around ${interests.join(' and ')}.</p>
          <a class="cta" href="/login">Enter your map</a>
          <a class="cta" href="/spark" style="background:transparent;border:1px solid rgba(255,248,233,0.3);color:#fff8e9;">React version</a>
        </div>`
    }

    skip.onclick = showInvite
    showArrival()
  </script>
</body>
</html>
