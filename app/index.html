<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MindCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Four typographic roles, deliberately, nothing else (2026-07-23 font
         consolidation pass): Caveat (voice/personality), DM Sans (body/UI
         everywhere), Source Serif 4 (story/chapter headings), IBM Plex Mono
         (data/labels). Weights below are exactly what's used across the app
         after an audit of every font-family declaration; Sora, Fredoka,
         Nunito, Nunito Sans, DM Serif Display, Space Grotesk, and DM Mono
         were accumulated debt and have been swept out entirely. This single
         link replaces what used to be two separate font-loading mechanisms
         (this link plus a second @import in global.css) -- see tokens.css. -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__MINDCRAFT_BUILD__ = '2026-06-24-practice-teal-v1'
      // GitHub Pages SPA redirect fix
      var redirect = sessionStorage.getItem('spa_redirect')
      if (redirect) {
        sessionStorage.removeItem('spa_redirect')
        window.history.replaceState(null, '', redirect)
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
