    <circle cx="-67" cy="82" r="9" fill="#e0b083" stroke="#33230f" stroke-width="3"/>
    <!-- head -->
    <circle cx="0" cy="-72" r="44" fill="#e0b083" stroke="#33230f" stroke-width="5"/>
    <path d="M-40 -84 Q0 -122 40 -84 Q42 -104 0 -116 Q-42 -104 -40 -84 Z" fill="#3a2717" stroke="#33230f" stroke-width="4"/>
