<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="Fib, the MindCraft bear with a golden spiral">
  <defs>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a66b"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="spiral" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#247a4d"/>
      <stop offset="100%" stop-color="#c4f547"/>
    </linearGradient>
  </defs>
  <!-- ears -->
  <circle cx="72" cy="52" r="28" fill="url(#fur)"/>
  <circle cx="168" cy="52" r="28" fill="url(#fur)"/>
  <circle cx="72" cy="52" r="14" fill="#f5e6c8"/>
  <circle cx="168" cy="52" r="14" fill="#f5e6c8"/>
  <!-- head -->
  <ellipse cx="120" cy="108" rx="78" ry="70" fill="url(#fur)"/>
  <!-- muzzle -->
  <ellipse cx="120" cy="128" rx="38" ry="30" fill="#f5e6c8"/>
  <ellipse cx="104" cy="112" rx="8" ry="10" fill="#3d2f10"/>
  <ellipse cx="136" cy="112" rx="8" ry="10" fill="#3d2f10"/>
  <path d="M108 138 Q120 148 132 138" stroke="#3d2f10" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="120" cy="210" rx="68" ry="58" fill="url(#fur)"/>
  <!-- Fibonacci spiral on chest -->
  <path d="M120 188
           a 8 8 0 1 1 0 16
           a 13 13 0 1 1 0 26
           a 21 21 0 1 1 0 42
           a 34 34 0 1 1 -34 0"
        fill="none" stroke="url(#spiral)" stroke-width="4" stroke-linecap="round"/>
  <!-- journal -->
  <rect x="148" y="196" width="44" height="36" rx="4" fill="#fbf8f4" stroke="#8b6914" stroke-width="2"/>
  <line x1="158" y1="206" x2="182" y2="206" stroke="#247a4d" stroke-width="1.5" opacity="0.6"/>
  <line x1="158" y1="214" x2="176" y2="214" stroke="#247a4d" stroke-width="1.5" opacity="0.4"/>
</svg>
