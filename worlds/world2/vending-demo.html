<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindCraft — Vending Project Screens Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Pro Text", system-ui, sans-serif;
        background: #0b1418;
        color: #e8f5f0;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      h1 {
        font-size: 1.4rem;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 20px;
        color: #9db8b0;
        max-width: 720px;
        line-height: 1.5;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }
      figure {
        margin: 0;
        background: #122028;
        border: 1px solid #234;
        border-radius: 14px;
        overflow: hidden;
      }
      figcaption {
        padding: 10px 12px 12px;
        font-size: 0.9rem;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        background: #000;
      }
      code {
        background: #1a2830;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Student project vending screens (preview)</h1>
    <p>
      Static preview of all 8 detail screens. In the 3D world these are baked into
      <code>project1–8.ktx2</code> textures on the vending machine.
    </p>
    <div class="grid">
      <figure>
        <img src="textures/screens/vendingMachineScreens/project1.png" alt="Three.js Island Portfolio" />
        <figcaption>1 — Three.js Island Portfolio</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project2.png" alt="Physics Arcade Machine" />
        <figcaption>2 — Physics Arcade Machine</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project3.png" alt="Solar System Remix" />
        <figcaption>3 — Solar System Remix</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project4.png" alt="Fractal Crystal Cave" />
        <figcaption>4 — Fractal Crystal Cave</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project5.png" alt="Roller Coaster Builder" />
        <figcaption>5 — Roller Coaster Builder</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project6.png" alt="Data Aquarium" />
        <figcaption>6 — Data Aquarium</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project7.png" alt="Maze Garden" />
        <figcaption>7 — Maze Garden</figcaption>
      </figure>
      <figure>
        <img src="textures/screens/vendingMachineScreens/project8.png" alt="Phoenix Flight Simulator" />
        <figcaption>8 — Phoenix Flight Simulator</figcaption>
      </figure>
    </div>
  </body>
</html>
