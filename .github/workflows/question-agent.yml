name: MindCraft Question Agent

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-questions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Generate question backlog batch
        working-directory: app
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run agent:questions

      - name: Commit generated backlog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: add generated question backlog batch'
          file_pattern: app/content/generatedQuestions.json
