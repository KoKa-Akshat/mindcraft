<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft — Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0F15;--bg2:#13161F;--card:#181B25;--card2:#1C1F2A;
  --g:#58CC02;--gd:#4CAD00;--gdd:#3A8500;--forest:#1A3C2A;
  --tx:#F0F2F8;--mu:#8B93A8;--mu2:#3E4559;--bd:rgba(255,255,255,.08);
  --f:'Nunito',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── NAV ── */
nav{height:62px;background:rgba(13,15,21,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,64px);position:sticky;top:0;z-index:100}
.nav-logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-.3px}
.nav-logo span{color:var(--g)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{font-size:14px;font-weight:700;color:var(--mu);text-decoration:none;padding:8px 14px;border-radius:8px;transition:color .15s}
.nav-link:hover{color:var(--tx)}
.nav-link.current{color:var(--tx)}
.nav-signin{background:rgba(255,255,255,.07);color:var(--tx);border:1px solid var(--bd);padding:8px 18px;border-radius:10px;font-size:13px;font-weight:800;font-family:var(--f);cursor:pointer;text-decoration:none;transition:background .15s}
.nav-signin:hover{background:rgba(255,255,255,.12)}

/* ── PAGE HEADER ── */
.page-header{padding:clamp(48px,7vw,80px) clamp(20px,5vw,64px) 0;max-width:1180px;margin:0 auto}
.page-eyebrow{font-size:12px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:14px;display:block}
.page-title{font-size:clamp(34px,5.5vw,56px);font-weight:900;color:var(--tx);letter-spacing:-.8px;line-height:1.08;margin-bottom:12px}
.page-sub{font-size:16px;color:var(--mu);font-weight:600;max-width:500px;line-height:1.65}

/* ── FEATURED ── */
.section-wrap{padding:clamp(32px,4vw,52px) clamp(20px,5vw,64px);max-width:1180px;margin:0 auto}
.featured-card{border-radius:22px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1fr;cursor:pointer;border:1px solid var(--bd);transition:border-color .2s,transform .2s}
.featured-card:hover{border-color:rgba(255,255,255,.16);transform:translateY(-2px)}
.feat-img{position:relative;min-height:380px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.feat-img-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.feat-badges{position:absolute;bottom:22px;left:22px;display:flex;gap:8px;z-index:2}
.fbadge{font-size:11px;font-weight:900;padding:5px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.fbadge-cat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff}
.fbadge-date{background:rgba(0,0,0,.3);backdrop-filter:blur(8px);color:rgba(255,255,255,.75);font-weight:700;text-transform:none;letter-spacing:0}
.feat-body{padding:44px 40px;background:var(--card);display:flex;flex-direction:column;justify-content:center}
.feat-cat{font-size:11px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.feat-title{font-size:clamp(22px,2.6vw,30px);font-weight:900;color:var(--tx);line-height:1.2;margin-bottom:16px;letter-spacing:-.3px}
.feat-excerpt{font-size:15px;color:var(--mu);line-height:1.72;font-weight:600;margin-bottom:28px;max-width:380px}
.feat-author{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.av-green{background:linear-gradient(135deg,#3A8500,#1A3C2A)}
.av-blue{background:linear-gradient(135deg,#1E3A6A,#2A5AAF)}
.av-name{font-size:14px;font-weight:800;color:var(--tx)}
.av-role{font-size:12px;color:var(--mu);font-weight:700;margin-top:1px}
.read-btn{display:inline-flex;align-items:center;gap:8px;background:var(--g);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:900;text-decoration:none;box-shadow:0 4px 0 var(--gd);transition:all .15s;font-family:var(--f);border:none;cursor:pointer;align-self:flex-start}
.read-btn:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:0 5px 0 var(--gd)}

/* ── FILTER ── */
.filter-wrap{padding:0 clamp(20px,5vw,64px) 28px;max-width:1180px;margin:0 auto}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:13px;font-weight:800;padding:8px 18px;border-radius:20px;cursor:pointer;border:1.5px solid var(--bd);color:var(--mu);background:none;font-family:var(--f);transition:all .15s}
.chip:hover{border-color:rgba(255,255,255,.18);color:var(--tx)}
.chip.on{background:rgba(88,204,2,.1);border-color:rgba(88,204,2,.28);color:var(--g)}

/* ── GRID ── */
.grid-wrap{padding:0 clamp(20px,5vw,64px) clamp(72px,10vw,120px);max-width:1180px;margin:0 auto}
.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.article-card{background:var(--card);border-radius:18px;overflow:hidden;cursor:pointer;border:1px solid var(--bd);transition:transform .2s,border-color .2s;display:flex;flex-direction:column}
.article-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15)}
.ac-img{aspect-ratio:16/9;position:relative;overflow:hidden}
.ac-body{padding:20px 22px 24px;flex:1;display:flex;flex-direction:column}
.ac-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.ac-cat{font-size:10px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1.2px}
.ac-date{font-size:11px;color:var(--mu2);font-weight:700}
.ac-title{font-size:17px;font-weight:900;color:var(--tx);line-height:1.3;margin-bottom:9px;letter-spacing:-.2px}
.ac-excerpt{font-size:13px;color:var(--mu);line-height:1.65;font-weight:600;margin-bottom:18px;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ac-author{display:flex;align-items:center;gap:8px;margin-top:auto}
.ac-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.ac-author-info{font-size:12px;font-weight:700;color:var(--mu)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 24px;color:var(--mu);font-weight:700;font-size:15px}

@media(max-width:900px){.articles-grid{grid-template-columns:1fr 1fr}.featured-card{grid-template-columns:1fr}}
@media(max-width:600px){.articles-grid{grid-template-columns:1fr}.feat-img{min-height:240px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Mind<span>Craft</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="blog.html" class="nav-link current">Blog</a>
  </div>
  <a href="login.html" class="nav-signin">Sign In</a>
</nav>

<div class="page-header">
  <span class="page-eyebrow">Stories &amp; Updates</span>
  <h1 class="page-title">The MindCraft Journal</h1>
  <p class="page-sub">Updates, insights, and stories from the team building the future of learning in St. Paul.</p>
</div>

<div class="section-wrap">
  <div id="featured"></div>
</div>

<div class="filter-wrap">
  <div class="filter-chips" id="chips"></div>
</div>

<div class="grid-wrap">
  <div class="articles-grid" id="grid"></div>
</div>

<script>
const ARTICLES = [
  {
    id: 1,
    title: "Our Mission & Vision",
    excerpt: "We started MindCraft with one belief: great tutoring should leave students more capable, not more dependent. Here's what drives everything we build.",
    category: "Headquarters",
    date: "April 5, 2026",
    author: { name: "Akshat K.", role: "Co-Founder", initial: "A" },
    bg1: "#0A1F10", bg2: "#1A3C2A", accent: "#58CC02",
    avClass: "av-green", acAvClass: "av-green", featured: true
  },
  {
    id: 2,
    title: "MindCraft was in Beta at Macalester last week",
    excerpt: "We ran our first real-world beta at Macalester College in St. Paul. Here's what we learned, what worked, and what comes next.",
    category: "Community",
    date: "March 28, 2026",
    author: { name: "Akshat K.", role: "Co-Founder", initial: "A" },
    bg1: "#0A1428", bg2: "#1A2A50", accent: "#4A7BF7",
    avClass: "av-blue", acAvClass: "av-blue", featured: false
  }
];

function heroSVG(accent) {
  const e = encodeURIComponent;
  return `<svg viewBox="0 0 360 220" width="260" fill="none" xmlns="http://www.w3.org/2000/svg" opacity=".18">
    <rect x="40" y="30" width="90" height="110" rx="12" fill="white"/>
    <rect x="56" y="48" width="58" height="7" rx="3.5" fill="white" opacity=".7"/>
    <rect x="56" y="62" width="44" height="5" rx="2.5" fill="white" opacity=".45"/>
    <rect x="56" y="74" width="50" height="5" rx="2.5" fill="white" opacity=".4"/>
    <rect x="56" y="86" width="38" height="5" rx="2.5" fill="white" opacity=".35"/>
    <rect x="56" y="100" width="32" height="20" rx="6" fill="${accent}" opacity=".6"/>
    <rect x="160" y="20" width="120" height="80" rx="12" fill="white"/>
    <rect x="176" y="36" width="88" height="7" rx="3.5" fill="white" opacity=".7"/>
    <rect x="176" y="50" width="68" height="5" rx="2.5" fill="white" opacity=".45"/>
    <rect x="176" y="62" width="76" height="5" rx="2.5" fill="white" opacity=".4"/>
    <rect x="160" y="118" width="120" height="52" rx="12" fill="${accent}" opacity=".2"/>
    <rect x="172" y="130" width="60" height="6" rx="3" fill="${accent}" opacity=".6"/>
    <rect x="172" y="143" width="44" height="5" rx="2.5" fill="white" opacity=".3"/>
  </svg>`;
}

function cardSVG(accent) {
  return `<svg viewBox="0 0 240 135" width="140" fill="none" xmlns="http://www.w3.org/2000/svg" opacity=".15">
    <rect x="16" y="16" width="70" height="90" rx="9" fill="white"/>
    <rect x="26" y="28" width="50" height="6" rx="3" fill="white" opacity=".7"/>
    <rect x="26" y="40" width="38" height="4.5" rx="2.25" fill="white" opacity=".45"/>
    <rect x="26" y="51" width="44" height="4.5" rx="2.25" fill="white" opacity=".4"/>
    <rect x="26" y="65" width="28" height="16" rx="5" fill="${accent}" opacity=".55"/>
    <rect x="106" y="24" width="118" height="64" rx="9" fill="white"/>
    <rect x="118" y="36" width="76" height="5.5" rx="2.75" fill="white" opacity=".7"/>
    <rect x="118" y="48" width="58" height="4" rx="2" fill="white" opacity=".45"/>
    <rect x="118" y="57" width="66" height="4" rx="2" fill="white" opacity=".4"/>
    <rect x="106" y="100" width="118" height="22" rx="7" fill="${accent}" opacity=".18"/>
  </svg>`;
}

const categories = ['All', ...new Set(ARTICLES.map(a => a.category))];
let current = 'All';

function renderChips() {
  document.getElementById('chips').innerHTML = categories.map(c =>
    `<button class="chip${c===current?' on':''}" onclick="filter('${c}')">${c}</button>`
  ).join('');
}

function filter(cat) {
  current = cat;
  renderChips();
  renderGrid();
}

function renderFeatured() {
  const a = ARTICLES.find(x => x.featured) || ARTICLES[0];
  document.getElementById('featured').innerHTML = `
    <div class="featured-card" onclick="go(${a.id})">
      <div class="feat-img" style="background:linear-gradient(145deg,${a.bg1} 0%,${a.bg2} 100%)">
        <div class="feat-img-inner">${heroSVG(a.accent)}</div>
        <div class="feat-badges">
          <span class="fbadge fbadge-cat">${a.category}</span>
          <span class="fbadge fbadge-date">${a.date}</span>
        </div>
      </div>
      <div class="feat-body">
        <div class="feat-cat">${a.category}</div>
        <div class="feat-title">${a.title}</div>
        <div class="feat-excerpt">${a.excerpt}</div>
        <div class="feat-author">
          <div class="av ${a.avClass}">${a.author.initial}</div>
          <div>
            <div class="av-name">${a.author.name}</div>
            <div class="av-role">${a.author.role}</div>
          </div>
        </div>
        <button class="read-btn" onclick="event.stopPropagation();go(${a.id})">Read Article →</button>
      </div>
    </div>`;
}

function renderGrid() {
  const list = current === 'All' ? ARTICLES : ARTICLES.filter(a => a.category === current);
  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">No articles in this category yet.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = list.map(a => `
    <div class="article-card" onclick="go(${a.id})">
      <div class="ac-img" style="background:linear-gradient(145deg,${a.bg1} 0%,${a.bg2} 100%);display:flex;align-items:center;justify-content:center">
        ${cardSVG(a.accent)}
      </div>
      <div class="ac-body">
        <div class="ac-meta">
          <span class="ac-cat">${a.category}</span>
          <span class="ac-date">${a.date}</span>
        </div>
        <div class="ac-title">${a.title}</div>
        <div class="ac-excerpt">${a.excerpt}</div>
        <div class="ac-author">
          <div class="ac-av ${a.acAvClass}">${a.author.initial}</div>
          <div class="ac-author-info">${a.author.name} &middot; ${a.author.role}</div>
        </div>
      </div>
    </div>`).join('');
}

function go(id) { window.location.href = 'article.html?id=' + id; }

renderFeatured();
renderChips();
renderGrid();
</script>
</body>
</html>
