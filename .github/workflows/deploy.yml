name: Deploy MindCraft

on:
  push:
    branches: [main]

jobs:
  # Deploy marketing site to GitHub Pages
  deploy-marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy marketing site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: 'app/**,.github/**,webhook/**,node_modules/**,functions/**'

  # Firebase marketing host (mindcraft-marketing-site.web.app)
  deploy-firebase-marketing:
    runs-on: ubuntu-latest
    needs: deploy-marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (marketing)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy --only hosting:marketing --project mindcraft-93858 --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

  # Firebase app host (mindcraft-93858.web.app — login, dashboard, etc.)
  deploy-firebase-app:
    runs-on: ubuntu-latest
    needs: deploy-marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build app
        working-directory: app
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (app)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy --only hosting:app --project mindcraft-93858 --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
