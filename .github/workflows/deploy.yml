name: Deploy MindCraft

on:
  push:
    branches: [main]

jobs:
  # Deploy marketing site to GitHub Pages
  deploy-marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy marketing site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: 'app/**,.github/**,webhook/**,node_modules/**,functions/**'

  # Firebase marketing host (mindcraft-marketing-site.web.app)
  deploy-firebase-marketing:
    runs-on: ubuntu-latest
    needs: deploy-marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (marketing)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting:marketing --project mindcraft-93858 --non-interactive
