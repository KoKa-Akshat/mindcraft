<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--g:#58CC02;--gd:#4CAD00;--gdd:#3A8500;--forest:#1A3C2A;--tx:#3C3C3C;--mu:#777;--w:#FFF;--bd:#E5E5E5;--f:'Nunito',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);color:var(--tx);background:#E8EDE6;min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}

@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── OUTER SHELL ── */
.split{display:flex;width:100%;padding:16px;gap:14px;min-height:100vh}

/* ── LEFT PANEL ── */
.left{flex:1.05;border-radius:22px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:flex-start;padding:32px}
.left-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%}
.left-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.22) 0%,rgba(0,0,0,.05) 50%,rgba(0,0,0,.28) 100%)}
.left-logo{position:relative;z-index:2;font-size:26px;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-.3px}
.left-logo span{color:var(--g)}

/* ── RIGHT PANEL ── */
.right{flex:1;border-radius:22px;background:var(--w);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 40px;box-shadow:0 4px 40px rgba(0,0,0,.07)}
.form-wrap{width:100%;max-width:348px}

/* ── MASCOT HEADER ── */
.rc-hero{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.rc-mascot-wrap{position:relative;width:88px;height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:bob 3.2s ease-in-out infinite}
.rc-mascot-wrap::before{content:'';position:absolute;inset:-6px;border-radius:50%;background:radial-gradient(circle,rgba(88,204,2,.18) 0%,rgba(88,204,2,.07) 55%,transparent 75%)}
.rc-mascot-wrap::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(88,204,2,.2)}
.rc-mascot{width:88px;height:88px;object-fit:contain;mix-blend-mode:multiply;position:relative;z-index:1}
.rc-copy{display:flex;flex-direction:column;justify-content:center}
.rc-brand-name{font-size:28px;font-weight:900;color:var(--forest);line-height:1.05;letter-spacing:-.4px}
.rc-brand-name span{color:var(--g)}
.rc-tagline{font-size:13px;color:var(--mu);font-weight:700;line-height:1.4;margin-top:5px;white-space:nowrap}

/* ── ROLE SELECTOR ── */
.role-selector{display:flex;gap:0;margin-bottom:22px;background:#F4F4F4;border-radius:13px;padding:4px;border:2px solid var(--bd)}
.role-opt{flex:1;text-align:center;padding:10px 6px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;color:var(--mu)}
.role-opt input{display:none}
.role-opt.active{background:var(--w);color:var(--gdd);box-shadow:0 2px 10px rgba(0,0,0,.07)}
.role-opt:hover:not(.active){color:var(--tx)}

/* ── FORM FIELDS ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:800;color:var(--mu);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field input{width:100%;padding:14px 16px;border:2px solid var(--bd);border-radius:12px;font-size:15px;font-family:var(--f);font-weight:600;color:var(--tx);outline:none;transition:border-color .18s,box-shadow .18s;background:var(--w)}
.field input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(88,204,2,.1)}
.field input::placeholder{color:#C4C4C4}

.forgot{text-align:right;margin-top:-6px;margin-bottom:18px}
.forgot a{font-size:13px;color:var(--g);text-decoration:none;font-weight:700}
.forgot a:hover{text-decoration:underline}

/* ── BUTTONS ── */
.submit-btn{width:100%;padding:15px;background:var(--g);color:var(--w);border:none;border-radius:12px;font-size:15px;font-weight:900;font-family:var(--f);cursor:pointer;box-shadow:0 4px 0 var(--gd);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.submit-btn:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 5px 0 var(--gd)}
.submit-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--gd)}

.divider{display:flex;align-items:center;gap:14px;margin:18px 0;color:var(--mu);font-size:13px;font-weight:700}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}

.google-btn{width:100%;padding:13px;background:var(--w);border:2px solid var(--bd);border-radius:12px;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;color:var(--tx)}
.google-btn:hover{background:#FAFAFA;border-color:#c8c8c8}
.google-btn svg{width:18px;height:18px;flex-shrink:0}

.bottom-link{text-align:center;margin-top:18px;font-size:14px;color:var(--mu);font-weight:600}
.bottom-link a{color:var(--g);text-decoration:none;font-weight:800}
.bottom-link a:hover{text-decoration:underline}

@media(max-width:820px){
  .split{flex-direction:column;padding:12px;gap:12px}
  .left{min-height:200px;flex:none}
  .right{max-width:100%;padding:36px 24px}
}
</style>
</head>
<body>

<div class="split">

  <!-- ── LEFT: tree painting ── -->
  <div class="left">
    <img src="img/tree.jpg" class="left-bg" alt="">
    <div class="left-overlay"></div>
    <a href="index.html" class="left-logo">Mind<span>Craft</span></a>
  </div>

  <!-- ── RIGHT: form ── -->
  <div class="right">
    <div class="form-wrap">

      <!-- Mascot + brand tagline -->
      <div class="rc-hero">
        <div class="rc-mascot-wrap">
          <img src="img/raccoon.png" class="rc-mascot" alt="MindCraft">
        </div>
        <div class="rc-copy">
          <div class="rc-brand-name">Mind<span>Craft</span></div>
          <p class="rc-tagline">Platform for Performance</p>
        </div>
      </div>

      <!-- Role selector — text only -->
      <div class="role-selector" id="roleSelector">
        <div class="role-opt active" onclick="selectRole(this)">
          Student<input type="radio" name="role" value="student" checked>
        </div>
        <div class="role-opt" onclick="selectRole(this)">
          Parent<input type="radio" name="role" value="parent">
        </div>
        <div class="role-opt" onclick="selectRole(this)">
          Tutor<input type="radio" name="role" value="tutor">
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label>Email or username</label>
        <input type="email" placeholder="you@email.com" id="email">
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" id="password">
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>

      <button class="submit-btn" onclick="handleLogin()">Sign in</button>

      <div class="divider">or</div>

      <button class="google-btn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>

      <p class="bottom-link">New to MindCraft? <a href="login.html">Create Account</a></p>

    </div>
  </div>
</div>

<script>
function selectRole(el) {
  document.querySelectorAll('.role-opt').forEach(function(opt) {
    opt.classList.remove('active');
  });
  el.classList.add('active');
  el.querySelector('input').checked = true;
}
function handleLogin() {
  var role = document.querySelector('input[name="role"]:checked').value;
  window.location.href = 'dashboard.html?role=' + role;
}
</script>

</body>
</html>
